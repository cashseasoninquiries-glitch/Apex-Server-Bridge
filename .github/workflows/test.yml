name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip3 install --break-system-packages --ignore-installed blinker \
            pytest \
            -r requirements.txt \
            -r ingestion_gateway/requirements.txt \
            -r recorder/requirements.txt

      - name: Run tests
        run: |
          python3 -m pytest tests/ -v --tb=short
