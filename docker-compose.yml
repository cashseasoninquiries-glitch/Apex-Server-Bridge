services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres_vault:
    image: postgres:15-alpine
    container_name: apex_postgres_vault
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apex_internal_network

  redis_queue:
    image: redis:7-alpine
    container_name: apex_redis_queue
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - apex_internal_network

  minio_lake:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: apex_minio_lake
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - apex_internal_network

  clickhouse_lake:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: apex_clickhouse_lake
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - apex_internal_network

  # ─────────────────────────────────────────────
  # INGESTION
  # ─────────────────────────────────────────────

  ingestion_gateway:
    build:
      context: ./ingestion_gateway
    container_name: apex_ingestion_gateway
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis_queue
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - apex_internal_network

  # ─────────────────────────────────────────────
  # PHASE 1 — CORE PIPELINE
  # ─────────────────────────────────────────────

  execution_engine:
    build: .
    container_name: apex_execution_engine
    restart: unless-stopped
    env_file: .env
    command: python execution_engine.py
    depends_on:
      - redis_queue
      - postgres_vault
    networks:
      - apex_internal_network

  strategy_mvp:
    build: .
    container_name: apex_strategy_mvp
    restart: unless-stopped
    env_file: .env
    command: python strategy_mvp.py
    depends_on:
      - redis_queue
    networks:
      - apex_internal_network

  recorder:
    build: ./recorder
    container_name: apex_recorder
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis_queue
      - postgres_vault
    networks:
      - apex_internal_network

  # ─────────────────────────────────────────────
  # PHASE 2 — INTELLIGENCE LAYER
  # ─────────────────────────────────────────────

  performance_calculator:
    build: .
    container_name: apex_performance_calculator
    restart: unless-stopped
    env_file: .env
    command: python performance_calculator.py
    depends_on:
      - redis_queue
      - postgres_vault
    networks:
      - apex_internal_network

  lifecycle_engine:
    build: .
    container_name: apex_lifecycle_engine
    restart: unless-stopped
    env_file: .env
    command: python lifecycle_engine.py
    depends_on:
      - redis_queue
      - postgres_vault
    networks:
      - apex_internal_network

  regime_detector:
    build: .
    container_name: apex_regime_detector
    restart: unless-stopped
    env_file: .env
    command: python regime_detector.py
    depends_on:
      - redis_queue
      - postgres_vault
    networks:
      - apex_internal_network

  ranking_engine:
    build: .
    container_name: apex_ranking_engine
    restart: unless-stopped
    env_file: .env
    command: python ranking_engine.py
    depends_on:
      - redis_queue
      - postgres_vault
    networks:
      - apex_internal_network

  discord_notifier:
    build: .
    container_name: apex_discord_notifier
    restart: unless-stopped
    env_file: .env
    command: python discord_notifier.py
    depends_on:
      - redis_queue
    networks:
      - apex_internal_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:

networks:
  apex_internal_network:
    driver: bridge
