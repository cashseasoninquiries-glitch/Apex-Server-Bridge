name: Sovereign Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/Apex_Server_Bridge || mkdir -p /root/Apex_Server_Bridge && cd /root/Apex_Server_Bridge
            git pull origin main || git clone https://github.com/${{ github.repository }} .
            docker stop apex_bridge || true
            docker rm apex_bridge || true
            docker build -t apex_bridge .
            docker run -d --name apex_bridge --restart always apex_bridge
